<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Empathy Engine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --card:    #22263a;
      --border:  #2e3250;
      --accent:  #6c63ff;
      --accent2: #a78bfa;
      --text:    #e8eaf6;
      --muted:   #7a7fa8;
      --joy:     #f59e0b;
      --anger:   #ef4444;
      --sadness: #60a5fa;
      --fear:    #c084fc;
      --surprise:#34d399;
      --neutral: #94a3b8;
      --disgust: #fb923c;
      --frustration: #f97316;
      --urgency: #dc2626;
      --confusion: #818cf8;
      --excitement: #fbbf24;
      --skepticism: #9ca3af;
      --empathy: #67e8f9;
      --disappointment: #a78bfa;
      --relief: #86efac;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    header { text-align: center; margin-bottom: 40px; }
    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    header p { color: var(--muted); margin-top: 8px; font-size: 1rem; }
    .container { width: 100%; max-width: 720px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
    }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 8px;
            letter-spacing: 0.05em; text-transform: uppercase; }
    textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      line-height: 1.6;
      padding: 14px 16px;
      resize: vertical;
      min-height: 120px;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: var(--accent2); }
    button:active { transform: scale(0.98); }
    button:disabled { background: var(--border); cursor: not-allowed; }
    .result { display: none; }
    .result.visible { display: block; }
    .emotion-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .section-label {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .emotion-vector { margin-bottom: 20px; }
    .emotion-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .emotion-name { font-size: 0.82rem; color: var(--muted); width: 110px; flex-shrink: 0; }
    .emotion-bar-wrap { flex: 1; height: 6px; background: var(--card); border-radius: 3px; overflow: hidden; }
    .emotion-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .emotion-score { font-size: 0.78rem; color: var(--muted); width: 36px; text-align: right; flex-shrink: 0; }
    .params-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .param-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 10px;
      text-align: center;
    }
    .param-box .val { font-size: 1.1rem; font-weight: 700; color: var(--accent2); }
    .param-box .lbl { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    audio { width: 100%; margin-top: 4px; border-radius: 8px; }
    .latency { font-size: 0.78rem; color: var(--muted); text-align: right; margin-top: 8px; }
    .spinner { display: none; text-align: center; padding: 20px; color: var(--muted); font-size: 0.9rem; }
    .spinner.active { display: block; }
    .error-msg {
      background: #3a1a1a; border: 1px solid #7f2020; border-radius: 10px;
      padding: 14px; color: #f87171; font-size: 0.9rem; display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <header>
    <h1>⚡ Empathy Engine</h1>
    <p>Multi-emotion vector · 175–225 Hz pitch band · Sales-aware</p>
  </header>

  <div class="container">
    <div class="card">
      <label for="text-input">Enter text to synthesize</label>
      <textarea id="text-input" placeholder="Type something with emotion — frustrated, excited, relieved, confused…"></textarea>
      <button id="btn-synthesize" onclick="synthesize()">🎙 Synthesize Speech</button>
    </div>

    <div class="spinner" id="spinner">Analyzing emotion vector and generating audio…</div>
    <div class="error-msg" id="error-msg"></div>

    <div class="card result" id="result-card">

      <div id="emotion-badge" class="emotion-badge"></div>

      <div class="emotion-vector">
        <div class="section-label">Emotion vector</div>
        <div id="vector-rows"></div>
      </div>

      <div class="params-grid">
        <div class="param-box">
          <div class="val" id="rate-val">—</div>
          <div class="lbl">Rate (%)</div>
        </div>
        <div class="param-box">
          <div class="val" id="pitch-hz-val">—</div>
          <div class="lbl">Pitch (Hz)</div>
        </div>
        <div class="param-box">
          <div class="val" id="pitch-st-val">—</div>
          <div class="lbl">Pitch (st)</div>
        </div>
        <div class="param-box">
          <div class="val" id="vol-val">—</div>
          <div class="lbl">Volume (dB)</div>
        </div>
      </div>

      <label>Generated audio</label>
      <audio id="audio-player" controls></audio>
      <div class="latency" id="latency"></div>
    </div>
  </div>

  <script>
    const EMOTION_COLORS = {
      joy: '#f59e0b', anger: '#ef4444', sadness: '#60a5fa',
      fear: '#c084fc', surprise: '#34d399', neutral: '#94a3b8',
      disgust: '#fb923c', frustration: '#f97316', urgency: '#dc2626',
      confusion: '#818cf8', excitement: '#fbbf24', skepticism: '#9ca3af',
      empathy: '#67e8f9', disappointment: '#a78bfa', relief: '#86efac',
    };

    const EMOTION_ICONS = {
      joy: '😊', anger: '😠', sadness: '😢', fear: '😨',
      surprise: '😲', neutral: '😐', disgust: '🤢',
      frustration: '😤', urgency: '⚡', confusion: '😕',
      excitement: '🤩', skepticism: '🤨', empathy: '🤝',
      disappointment: '😞', relief: '😮‍💨',
    };

    async function synthesize() {
      const text = document.getElementById('text-input').value.trim();
      if (!text) return;

      setLoading(true);
      clearError();
      hideResult();

      try {
        const res = await fetch('/synthesize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Synthesis failed');
        }
        const data = await res.json();
        showResult(data);
      } catch (e) {
        showError(e.message);
      } finally {
        setLoading(false);
      }
    }

    function showResult(data) {
      const color = EMOTION_COLORS[data.emotion] || '#94a3b8';
      const icon  = EMOTION_ICONS[data.emotion]  || '🎤';

      // Badge
      const badge = document.getElementById('emotion-badge');
      badge.style.background = color + '22';
      badge.style.border     = `1px solid ${color}66`;
      badge.style.color      = color;
      badge.innerHTML = `${icon} ${data.emotion.toUpperCase()}
        <span style="font-weight:400;font-size:0.8rem;opacity:0.8">
          + ${data.secondary}
        </span>
        <span style="font-weight:400;font-size:0.8rem;opacity:0.7">
          intensity ${(data.intensity * 100).toFixed(0)}%
        </span>`;

      // Emotion vector bars
      const sorted = Object.entries(data.emotion_vector)
        .sort((a, b) => b[1] - a[1])
        .filter(([, s]) => s > 0.05);

      const container = document.getElementById('vector-rows');
      container.innerHTML = '';
      sorted.forEach(([emotion, score]) => {
        const c   = EMOTION_COLORS[emotion] || '#94a3b8';
        const pct = (score * 100).toFixed(0);
        container.innerHTML += `
          <div class="emotion-row">
            <span class="emotion-name">${emotion}</span>
            <div class="emotion-bar-wrap">
              <div class="emotion-bar-fill" style="width:${pct}%;background:${c}"></div>
            </div>
            <span class="emotion-score">${score.toFixed(2)}</span>
          </div>`;
      });

      // Params
      document.getElementById('rate-val').textContent     = `${data.rate_percent.toFixed(0)}%`;
      document.getElementById('pitch-hz-val').textContent = `${data.pitch_hz.toFixed(0)}`;
      document.getElementById('pitch-st-val').textContent = `${data.pitch_st > 0 ? '+' : ''}${data.pitch_st.toFixed(2)}`;
      document.getElementById('vol-val').textContent      = `${data.volume_db > 0 ? '+' : ''}${data.volume_db.toFixed(1)}`;

      // Audio
      const audio = document.getElementById('audio-player');
      audio.src = data.audio_url + '?t=' + Date.now();
      audio.load();
      audio.play().catch(() => {});

      document.getElementById('latency').textContent = `Generated in ${data.latency_ms}ms`;
      document.getElementById('result-card').classList.add('visible');
    }

    function setLoading(on) {
      document.getElementById('spinner').classList.toggle('active', on);
      document.getElementById('btn-synthesize').disabled = on;
    }
    function hideResult() {
      document.getElementById('result-card').classList.remove('visible');
    }
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = `Error: ${msg}`;
      el.classList.add('visible');
    }
    function clearError() {
      document.getElementById('error-msg').classList.remove('visible');
    }

    document.getElementById('text-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) synthesize();
    });
  </script>
</body>
</html>
